version: '3.9'
services:
  backend:
    build: ./backend
    working_dir: /app
    volumes:
      - ./backend:/app
    command: sh -c "npm install && npm run migrate && npm run seed && npm run dev"
    ports:
      - "8787:8787"

  frontend:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./:/app
    command: sh -c "npm install && npm run build && node server.js"
    ports:
      - "3001:3001"
    depends_on:
      - backend
